# Keepalived Configuration - Access Proxy
# ПРИМЕР — сгенерирован из шаблона keepalived.conf.j2
# с параметрами по умолчанию для access-01 (MASTER)
# Managed by Ansible - DO NOT EDIT MANUALLY
# Host: access-01 (45.151.144.130)

global_defs {
    router_id AI_PROXY_RU
    script_user root
    enable_script_security
}

# Проверка доступности Squid с автоперезапуском
# Скрипт: killall -0 squid (проверка) → systemctl restart squid (при падении)
# Cooldown 30s между попытками рестарта
vrrp_script check_squid {
    script "/etc/keepalived/check_and_restart_squid.sh"
    interval 2
    weight -20
    fall 3
    rise 2
}

vrrp_instance VI_SQUID {
    # Установить MASTER на access-01, BACKUP на access-02
    state MASTER
    # Интерфейс default gateway (автоопределение в Ansible через ansible_default_ipv4.interface)
    interface eth0
    virtual_router_id 51

    # priority 100 для MASTER, 90 для BACKUP
    priority 100

    advert_int 1

    authentication {
        auth_type PASS
        auth_pass ExAmPlEpAsS
    }

    virtual_ipaddress {
        1.2.3.4/24
    }

    track_script {
        check_squid
    }

    # Уведомления при смене состояния (опционально, см. keepalived_notify_script)
    # notify_master "/etc/keepalived/notify.sh master"
    # notify_backup "/etc/keepalived/notify.sh backup"
    # notify_fault  "/etc/keepalived/notify.sh fault"
}
