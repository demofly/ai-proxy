#!/usr/sbin/nft -f
# nftables Configuration - Upstream Proxy
# Example generated from nftables-upstream.conf.j2
# with default inventory (2 access proxies, Squid port 80, MTProxy enabled)

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        # Allow established/related connections
        ct state established,related accept

        # Allow loopback
        iif "lo" accept

        # Allow SSH
        tcp dport 22 accept

        # Allow Squid only from access proxies
        ip saddr 203.0.113.1 tcp dport 80 accept
        ip saddr 203.0.113.2 tcp dport 80 accept

        # Allow DNS (unbound) from access proxies
        ip saddr 203.0.113.1 tcp dport 53 accept
        ip saddr 203.0.113.1 udp dport 53 accept
        ip saddr 203.0.113.2 tcp dport 53 accept
        ip saddr 203.0.113.2 udp dport 53 accept

        # Allow MTProxy TLS (nginx on 443) from access proxies
        ip saddr 203.0.113.1 tcp dport 443 accept
        ip saddr 203.0.113.2 tcp dport 443 accept

        # Allow ICMP ping
        icmp type echo-request accept
        icmpv6 type echo-request accept

        # Log dropped packets (optional, uncomment if needed)
        # log prefix "nftables dropped: " flags all counter
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
