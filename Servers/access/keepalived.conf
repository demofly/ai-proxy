# Keepalived Configuration - Access Proxy
# Обеспечивает отказоустойчивость через виртуальный IP (VRRP)
#
# Развернуть на двух серверах:
# - access-01 (5.228.141.93) - MASTER, priority 100
# - access-02 (5.228.141.94) - BACKUP, priority 90
# - VIP: 5.228.141.95 - виртуальный IP для клиентов

global_defs {
    router_id AI_PROXY_ACCESS
    script_user root
    enable_script_security
}

# Проверка доступности Squid
vrrp_script check_squid {
    script "/usr/bin/killall -0 squid"
    interval 2
    weight -20
    fall 3
    rise 2
}

vrrp_instance VI_SQUID {
    # Установить MASTER на access-01, BACKUP на access-02
    state MASTER
    # Интерфейс default gateway (автоопределение в Ansible через ansible_default_ipv4.interface)
    interface eth0
    virtual_router_id 51

    # priority 100 для MASTER, 90 для BACKUP
    priority 100

    advert_int 1

    authentication {
        auth_type PASS
        auth_pass AiPr0xy2024
    }

    virtual_ipaddress {
        5.228.141.95/24
    }

    track_script {
        check_squid
    }

    # Уведомления при смене состояния (опционально)
    # notify_master "/etc/keepalived/notify.sh master"
    # notify_backup "/etc/keepalived/notify.sh backup"
    # notify_fault  "/etc/keepalived/notify.sh fault"
}
