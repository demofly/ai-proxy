# Squid Configuration - Upstream Proxy (Squid 6.10)
# Анонимный транспорт для access прокси
#
# Развернуть на двух серверах для отказоустойчивости:
# - upstream-01: 185.199.108.10
# - upstream-02: 185.199.109.10
# Access прокси автоматически переключается между ними при отказе

# Отключаем кеширование и логирование
cache deny all
access_log none
cache_log /dev/null

# ACL: только IP access прокси
acl access_proxy src 5.228.141.93 5.228.141.94

# Порт
http_port 443

# Правила доступа
http_access allow access_proxy
http_access deny all

# Анонимность
forwarded_for off
via off

request_header_access X-Forwarded-For deny all
request_header_access Via deny all
request_header_access X-Real-IP deny all

reply_header_access Via deny all
reply_header_access X-Cache deny all

# Таймауты
connect_timeout 60 seconds
read_timeout 60 seconds

# ICP отключен
icp_port 0

# DNS
dns_nameservers 9.9.9.9 8.8.8.8 1.1.1.1
