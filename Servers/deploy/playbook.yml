---
# Ansible Playbook для развертывания AI Proxy на базе Squid
# Использование: ansible-playbook -i inventory.yml playbook.yml

- name: Deploy AI Proxy (Squid)
  hosts: all
  become: true

  vars:
    squid_config_path: /etc/squid/squid.conf
    squid_passwd_path: /etc/squid/passwd

  tasks:
    # Обновление кеша пакетов
    - name: Update apt cache (Debian family)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == 'Debian'

    # Удаление ненужных пакетов
    - name: Remove unnecessary packages (Debian family)
      ansible.builtin.apt:
        name:
          - packagekit
          - multipath-tools
        state: absent
        purge: true
      when: ansible_os_family == 'Debian'

    - name: Remove unnecessary packages (RHEL family)
      ansible.builtin.dnf:
        name:
          - PackageKit
          - device-mapper-multipath
        state: absent
      when: ansible_os_family == 'RedHat'

    # Настройка SSH - отключение DNS lookup для ускорения подключения
    - name: Disable UseDNS in sshd_config
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?UseDNS\s+'
        line: 'UseDNS no'
        state: present
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Reload sshd

    # Установка базовых утилит
    # psmisc: killall (используется в keepalived check_and_restart_squid.sh)
    # bsdutils/util-linux: logger (syslog-уведомления из скриптов keepalived)
    - name: Install base utilities (Debian family)
      ansible.builtin.package:
        name:
          - mc
          - haveged
          - psmisc
          - bsdutils
        state: present
      when: ansible_os_family == 'Debian'

    - name: Install base utilities (RHEL family)
      ansible.builtin.dnf:
        name:
          - mc
          - haveged
          - psmisc
          - util-linux
        state: present
      when: ansible_os_family == 'RedHat'

    - name: Enable and start haveged
      ansible.builtin.systemd:
        name: haveged
        enabled: true
        state: started

    # Вычисление ресурсных лимитов на основе CPU и RAM
    # CPU: используем все ядра
    # RAM: используем 1/5 (20%) от общего объёма
    - name: Calculate resource limits
      ansible.builtin.set_fact:
        cpu_cores: "{{ ansible_processor_vcpus | default(1) }}"
        ram_mb: "{{ ansible_memtotal_mb | default(2048) }}"
        ram_for_proxy_mb: "{{ (ansible_memtotal_mb | default(2048) / 5) | int }}"
        # Буферы сокетов: 1/20 от выделенной памяти на буфер (в байтах)
        socket_buffer_bytes: "{{ ((ansible_memtotal_mb | default(2048) / 5 / 20) * 1024 * 1024) | int }}"
        # Лимиты FD: 4096 на ядро, минимум 65535
        fd_limit: "{{ [ansible_processor_vcpus | default(1) * 4096, 65535] | max }}"
        # Очереди: 8192 на ядро, минимум 65535
        queue_limit: "{{ [ansible_processor_vcpus | default(1) * 8192, 65535] | max }}"
        # TIME_WAIT buckets: 32768 на ядро
        tw_buckets: "{{ ansible_processor_vcpus | default(1) * 32768 }}"

    # Увеличение лимитов файловых дескрипторов (привязано к ядрам)
    - name: Configure system limits (ulimit)
      ansible.builtin.copy:
        dest: /etc/security/limits.d/99-proxy.conf
        content: |
          # Лимиты для прокси-сервера ({{ cpu_cores }} ядер, {{ ram_mb }} MB RAM)
          # FD limit: {{ fd_limit }} (4096 на ядро, мин 65535)
          * soft nofile {{ fd_limit }}
          * hard nofile {{ fd_limit }}
          * soft nproc {{ fd_limit }}
          * hard nproc {{ fd_limit }}
          root soft nofile {{ fd_limit }}
          root hard nofile {{ fd_limit }}
        owner: root
        group: root
        mode: '0644'

    # Оптимизация сетевых параметров ядра (привязано к CPU и RAM)
    # NOTE: При co-deployment с Matrix — Matrix common role пропускает конфликтующие
    # параметры (ai_proxy_present=true) и задаёт только свои уникальные:
    # vm.swappiness, net.core.rmem_default, net.core.wmem_default
    - name: Configure sysctl for low latency networking
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        # Снижение задержек
        - { name: 'net.ipv4.tcp_slow_start_after_idle', value: '0' }
        - { name: 'net.ipv4.tcp_no_metrics_save', value: '1' }
        - { name: 'net.ipv4.tcp_mtu_probing', value: '1' }
        # Уменьшение времени жизни устаревших соединений (в 10 раз)
        - { name: 'net.ipv4.tcp_fin_timeout', value: '6' }
        - { name: 'net.ipv4.tcp_tw_reuse', value: '1' }
        - { name: 'net.ipv4.tcp_keepalive_time', value: '720' }
        - { name: 'net.ipv4.tcp_keepalive_intvl', value: '7' }
        - { name: 'net.ipv4.tcp_keepalive_probes', value: '3' }
        # Увеличение буферов и очередей (привязано к ядрам)
        - { name: 'net.core.somaxconn', value: '{{ queue_limit }}' }
        - { name: 'net.ipv4.tcp_max_syn_backlog', value: '{{ queue_limit }}' }
        - { name: 'net.core.netdev_max_backlog', value: '{{ queue_limit }}' }
        # Буферы памяти для сокетов (привязано к RAM: 1/5 RAM / 20)
        - { name: 'net.core.rmem_max', value: '{{ socket_buffer_bytes }}' }
        - { name: 'net.core.wmem_max', value: '{{ socket_buffer_bytes }}' }
        - { name: 'net.ipv4.tcp_rmem', value: '4096 87380 {{ socket_buffer_bytes }}' }
        - { name: 'net.ipv4.tcp_wmem', value: '4096 65536 {{ socket_buffer_bytes }}' }
        # Расширение диапазона локальных портов
        - { name: 'net.ipv4.ip_local_port_range', value: '1024 65535' }
        # SYN flood защита
        - { name: 'net.ipv4.tcp_syncookies', value: '1' }
        - { name: 'net.ipv4.tcp_max_tw_buckets', value: '{{ tw_buckets }}' }
        # Ускорение обработки пакетов
        - { name: 'net.ipv4.tcp_timestamps', value: '1' }
        - { name: 'net.ipv4.tcp_sack', value: '1' }
        - { name: 'net.ipv4.tcp_window_scaling', value: '1' }
        # Уменьшение памяти для orphan сокетов (привязано к ядрам)
        - { name: 'net.ipv4.tcp_max_orphans', value: '{{ fd_limit }}' }
        - { name: 'net.ipv4.tcp_orphan_retries', value: '1' }

    # ===========================================================================
    # Phase: DNS resolver (unbound caching resolver)
    # ===========================================================================
    # ВАЖНО: upstream-ноды деплоятся первыми (они слушают DNS для access-нод)
    # Порядок: upstreams → access обеспечивается inventory ordering

    - name: Include dns_resolver role
      ansible.builtin.include_role:
        name: dns_resolver
        apply:
          tags: [dns]
      tags: [dns]

    # Общие задачи для всех прокси
    - name: Install Squid
      ansible.builtin.package:
        name: squid
        state: present
      register: squid_installed

    # Fresh install: apt auto-starts Squid with default config.
    # Stop it — we deploy full config first, then start with correct config.
    - name: Stop Squid after fresh install (config not ready yet)
      ansible.builtin.systemd:
        name: squid
        state: stopped
      when: squid_installed.changed

    # systemd override для Squid - лимиты файловых дескрипторов
    # (limits.conf не работает для systemd сервисов)
    - name: Create systemd override directory for Squid
      ansible.builtin.file:
        path: /etc/systemd/system/squid.service.d
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Configure systemd limits for Squid
      ansible.builtin.copy:
        dest: /etc/systemd/system/squid.service.d/limits.conf
        content: |
          [Service]
          # Лимиты привязаны к ядрам: {{ fd_limit }} (4096 на ядро, мин 65535)
          LimitNOFILE={{ fd_limit }}
          LimitNPROC={{ fd_limit }}
        owner: root
        group: root
        mode: '0644'
      register: squid_systemd_override

    - name: Reload systemd after Squid override change
      ansible.builtin.systemd:
        daemon_reload: true
      when: squid_systemd_override.changed | default(false)

    - name: Ensure Squid directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: proxy
        group: proxy
        mode: '0755'
      loop:
        - /var/spool/squid
        - /var/log/squid

    # Определяем, работает ли nginx с виртуалхостом на порту 443.
    # Если да — Squid слушает на 127.0.0.1:3128 (nginx терминирует TLS и проксирует).
    # Ручное переопределение: behind_nginx=true/false в inventory.
    - name: Detect nginx with active virtual host on port 443
      ansible.builtin.shell: |
        set -o pipefail
        if systemctl is-active --quiet nginx 2>/dev/null && \
           grep -rqlE 'listen\s+(443|.*:443)\b' /etc/nginx/sites-enabled/ /etc/nginx/stream.d/ /etc/nginx/conf.d/ 2>/dev/null; then
          echo 'true'
        else
          echo 'false'
        fi
      args:
        executable: /bin/bash
      register: _nginx_443_detect
      changed_when: false
      tags: [nginx]

    - name: Set nginx_on_443 fact (auto-detect or manual override)
      ansible.builtin.set_fact:
        nginx_on_443: "{{ behind_nginx | default(mtproxy_enabled | default(false) | bool or _nginx_443_detect.stdout | trim | bool) }}"
      tags: [nginx]

    # ===========================================================================
    # Phase: Firewall detection (before roles that need it)
    # ===========================================================================

    - name: Check if ufw is active
      ansible.builtin.shell: |
        ufw status 2>/dev/null | grep -q '^Status: active' && echo 'active' || echo 'inactive'
      register: ufw_status
      changed_when: false
      failed_when: false

    # ===========================================================================
    # Phase: nginx и MTProxy (ПЕРЕД конфигурацией Squid)
    # nginx/MTProxy должны быть настроены первыми, чтобы освободить порты
    # для Squid (upstream: nginx освобождает :80; access: nginx занимает :443)
    # ===========================================================================

    # MTProxy role (upstream): устанавливает nginx, настраивает SNI на :443,
    # удаляет default site с :80, деплоит mtg daemon
    - name: Include mtproxy role
      ansible.builtin.include_role:
        name: mtproxy
        apply:
          tags: [mtproxy]
      when:
        - proxy_role == 'upstream'
        - mtproxy_enabled | default(false) | bool
      tags: [mtproxy]

    # nginx role (access): устанавливает nginx на :443, переконфигурирует Squid
    # за nginx (с rollback при ошибке). Деплоит squid-access.conf внутри роли.
    - name: Include nginx role for SNI routing
      ansible.builtin.include_role:
        name: nginx
        apply:
          tags: [nginx]
      when:
        - proxy_role == 'access'
        - nginx_on_443 | default(false) | bool
      tags: [nginx]

    # ===========================================================================
    # Phase: Squid configuration
    # ===========================================================================

    # Сохраняем критические параметры текущего конфига перед изменением
    # Эти параметры требуют restart при изменении (reload недостаточен)
    - name: Get current critical Squid parameters
      ansible.builtin.shell: |
        set -o pipefail
        HTTP_PORT=$(grep -E '^http_port\s+' {{ squid_config_path }} 2>/dev/null | head -1 | sed 's/^http_port\s*//' || echo 'none')
        CACHE_DIR=$(grep -E '^cache_dir\s+' {{ squid_config_path }} 2>/dev/null | head -1 | awk '{print $2":"$3":"$4":"$5}' || echo 'none')
        echo "${HTTP_PORT}|${CACHE_DIR}"
      args:
        executable: /bin/bash
      register: squid_params_before
      changed_when: false
      failed_when: false

    # Конфигурация для access прокси (только если MTProxy отключён)
    # При включённом MTProxy deploy squid config происходит в роли nginx
    - name: Deploy Squid config (access proxy, without MTProxy)
      ansible.builtin.template:
        src: templates/squid-access.conf.j2
        dest: "{{ squid_config_path }}"
        owner: root
        group: root
        mode: '0644'
        validate: 'squid -k parse -f %s'
      when: proxy_role == 'access' and not (mtproxy_enabled | default(false) | bool)
      register: squid_config_access

    # Конфигурация для upstream прокси
    # Порт :80 уже свободен — nginx default site удалён ролью mtproxy
    - name: Deploy Squid config (upstream proxy)
      ansible.builtin.template:
        src: templates/squid-upstream.conf.j2
        dest: "{{ squid_config_path }}"
        owner: root
        group: root
        mode: '0644'
        validate: 'squid -k parse -f %s'
      when: proxy_role == 'upstream'
      register: squid_config_upstream

    # Копирование файла паролей (только access, до reload/restart)
    - name: Deploy passwd file (access only)
      ansible.builtin.copy:
        src: passwd
        dest: "{{ squid_passwd_path }}"
        owner: root
        group: proxy
        mode: '0640'
      when: proxy_role == 'access' and enable_auth
      notify: Reload Squid
      tags: passwd

    # Очистка журналов при отключении логирования
    - name: Clean Squid log directory when logging is disabled
      ansible.builtin.file:
        path: /var/log/squid
        state: "{{ item }}"
        owner: proxy
        group: proxy
        mode: '0755'
      loop:
        - absent
        - directory
      when: not (enable_logging | default(true))

    # Получаем новые критические параметры после деплоя
    - name: Get new critical Squid parameters
      ansible.builtin.shell: |
        set -o pipefail
        HTTP_PORT=$(grep -E '^http_port\s+' {{ squid_config_path }} | head -1 | sed 's/^http_port\s*//')
        CACHE_DIR=$(grep -E '^cache_dir\s+' {{ squid_config_path }} 2>/dev/null | head -1 | awk '{print $2":"$3":"$4":"$5}' || echo 'none')
        echo "${HTTP_PORT}|${CACHE_DIR}"
      args:
        executable: /bin/bash
      register: squid_params_after
      changed_when: false
      when: squid_config_access.changed | default(false) or squid_config_upstream.changed | default(false)

    # Определяем: требуется restart или достаточно reload
    # Restart нужен при изменении: http_port, cache_dir
    - name: Determine if Squid restart is required
      ansible.builtin.set_fact:
        squid_restart_required: "{{ squid_params_before.stdout | default('') != squid_params_after.stdout | default('') }}"
      when: squid_config_access.changed | default(false) or squid_config_upstream.changed | default(false)

    # Проверяем, запущен ли Squid
    - name: Check if Squid is running
      ansible.builtin.command: systemctl is-active squid
      register: squid_status
      changed_when: false
      failed_when: false
      when: squid_config_access.changed | default(false) or squid_config_upstream.changed | default(false)

    # Reload Squid - для изменений ACL, headers, auth, timeouts и т.д. (non-critical config changes)
    - name: Reload Squid
      ansible.builtin.systemd:
        name: squid
        state: reloaded
      when: >
        (squid_config_access.changed | default(false) or squid_config_upstream.changed | default(false))
        and not (squid_restart_required | default(false))
        and (squid_status.stdout | default('') == 'active')

    # Start Squid если он не был запущен
    - name: Start Squid (if not running)
      ansible.builtin.systemd:
        name: squid
        state: started
      when: >
        (squid_config_access.changed | default(false) or squid_config_upstream.changed | default(false))
        and not (squid_restart_required | default(false))
        and (squid_status.stdout | default('') != 'active')

    # Restart Squid - при изменении http_port или cache_dir
    - name: Restart Squid (critical config changes - port or cache_dir)
      ansible.builtin.systemd:
        name: squid
        state: restarted
      when: >
        (squid_config_access.changed | default(false) or squid_config_upstream.changed | default(false))
        and (squid_restart_required | default(false))

    # Примечание: reload/restart Squid выполняется inline выше
    # (не через handlers, т.к. требуется логика выбора reload vs restart)

    # Инициализация кеша (только access прокси)
    - name: Initialize Squid cache (access proxy only)
      ansible.builtin.command: squid -z
      args:
        creates: /var/spool/squid/00
      when: proxy_role == 'access' and enable_caching

    # ===========================================================================
    # Phase: Firewall (upstream only)
    # ===========================================================================

    # Настройка firewall (upstream) - UFW (если ufw активен)
    - name: Configure UFW for upstream proxy
      when: proxy_role == 'upstream' and ufw_status.stdout | default('') == 'active'
      block:
        - name: Install UFW
          ansible.builtin.package:
            name: ufw
            state: present

        - name: Allow SSH (UFW)
          community.general.ufw:
            rule: allow
            port: '22'
            proto: tcp

        - name: Allow Squid only from access proxies (UFW)
          community.general.ufw:
            rule: allow
            port: "{{ squid_port }}"
            proto: tcp
            from_ip: "{{ hostvars[item]['ansible_host'] }}"
          loop: "{{ groups['access_proxies'] }}"

        # Migration: remove old Squid UFW rule for port 443
        # (Squid moved from behind nginx:443 to dedicated port)
        # Не удаляем если MTProxy включён — порт 443 используется для SNI router
        - name: "Migration: remove old Squid UFW rule for port 443"
          community.general.ufw:
            rule: allow
            port: '443'
            proto: tcp
            from_ip: "{{ hostvars[item]['ansible_host'] }}"
            delete: true
          loop: "{{ groups['access_proxies'] }}"
          failed_when: false
          when: squid_port | string != '443' and not (mtproxy_enabled | default(false) | bool)

        - name: Allow MTProxy TLS from access proxies (UFW)
          community.general.ufw:
            rule: allow
            from_ip: "{{ hostvars[item]['ansible_host'] }}"
            to_port: "443"
            proto: tcp
            comment: "MTProxy TLS from {{ item }}"
          loop: "{{ groups['access_proxies'] }}"
          when: mtproxy_enabled | default(false) | bool

        - name: Allow DNS (unbound) from access proxies (UFW)
          community.general.ufw:
            rule: allow
            port: '53'
            proto: "{{ item.1 }}"
            from_ip: "{{ hostvars[item.0]['ansible_host'] }}"
          loop: "{{ groups['access_proxies'] | product(['tcp', 'udp']) | list }}"

        - name: Enable UFW with default deny
          community.general.ufw:
            state: enabled
            default: deny
            direction: incoming

    # Настройка firewall (upstream) - nftables (Debian без ufw)
    - name: Configure nftables for upstream proxy (Debian)
      when: proxy_role == 'upstream' and ansible_distribution == 'Debian' and ufw_status.stdout | default('') != 'active'
      block:
        - name: Install nftables
          ansible.builtin.package:
            name: nftables
            state: present

        - name: Deploy nftables config
          ansible.builtin.template:
            src: templates/nftables-upstream.conf.j2
            dest: /etc/nftables.conf
            owner: root
            group: root
            mode: '0644'
          notify: Restart nftables

        - name: Enable and start nftables
          ansible.builtin.systemd:
            name: nftables
            enabled: true
            state: started

    # Настройка firewall (upstream) - iptables с собственной цепочкой (без ufw, без Debian)
    - name: Configure iptables for upstream proxy (custom chain)
      when: proxy_role == 'upstream' and ansible_distribution != 'Debian' and ufw_status.stdout | default('') != 'active'
      vars:
        squid_chain: SQUID-PROXY
      block:
        - name: Create custom iptables chain
          ansible.builtin.iptables:
            chain: "{{ squid_chain }}"
            chain_management: true
            state: present

        - name: Check if jump to custom chain exists in INPUT
          ansible.builtin.shell: |
            iptables -C INPUT -j {{ squid_chain }} 2>/dev/null && echo 'exists' || echo 'missing'
          register: chain_jump_check
          changed_when: false
          failed_when: false

        - name: Add jump to custom chain at the beginning of INPUT
          ansible.builtin.shell: |
            iptables -I INPUT 1 -j {{ squid_chain }}
          when: chain_jump_check.stdout == 'missing'

        - name: Flush custom chain before adding rules
          ansible.builtin.iptables:
            chain: "{{ squid_chain }}"
            flush: true

        - name: Allow Squid from access proxies (custom chain)
          ansible.builtin.iptables:
            chain: "{{ squid_chain }}"
            protocol: tcp
            destination_port: "{{ squid_port }}"
            source: "{{ hostvars[item]['ansible_host'] }}"
            jump: ACCEPT
          loop: "{{ groups['access_proxies'] }}"

        - name: Allow MTProxy TLS from access proxies (iptables)
          ansible.builtin.iptables:
            chain: "{{ squid_chain }}"
            protocol: tcp
            destination_port: "443"
            source: "{{ hostvars[item]['ansible_host'] }}"
            jump: ACCEPT
          loop: "{{ groups['access_proxies'] }}"
          when: mtproxy_enabled | default(false) | bool

        - name: Drop other traffic to Squid port (custom chain)
          ansible.builtin.iptables:
            chain: "{{ squid_chain }}"
            protocol: tcp
            destination_port: "{{ squid_port }}"
            jump: DROP

        - name: Return from custom chain for non-matching traffic
          ansible.builtin.iptables:
            chain: "{{ squid_chain }}"
            jump: RETURN

        - name: Save iptables rules (Debian/Ubuntu)
          ansible.builtin.shell: |
            mkdir -p /etc/iptables && iptables-save > /etc/iptables/rules.v4
          changed_when: true
          when: ansible_os_family == 'Debian'

        - name: Save iptables rules (RHEL/CentOS)
          ansible.builtin.shell: |
            mkdir -p /etc/sysconfig && iptables-save > /etc/sysconfig/iptables
          changed_when: true
          when: ansible_os_family == 'RedHat'

    # Автообновление пакетов (upstream)
    - name: Enable unattended upgrades (upstream proxy only)
      ansible.builtin.package:
        name: unattended-upgrades
        state: present
      when: proxy_role == 'upstream'

    - name: Enable and start Squid
      ansible.builtin.systemd:
        name: squid
        enabled: true
        state: started

    # ===========================================================================
    # Phase: Keepalived (access proxies only, VRRP failover)
    # ===========================================================================

    - name: Skip Keepalived - VIP not configured
      ansible.builtin.debug:
        msg: "Keepalived пропущен: переменная keepalived_vip не задана в inventory. Для включения VRRP укажите keepalived_vip."
      when: proxy_role == 'access' and enable_keepalived | default(false) and keepalived_vip is not defined

    - name: Install Keepalived (access proxy only)
      ansible.builtin.package:
        name: keepalived
        state: present
      when: proxy_role == 'access' and enable_keepalived | default(false) and keepalived_vip is defined

    - name: Deploy Squid health-check script (auto-restart with cooldown)
      ansible.builtin.template:
        src: templates/check_and_restart_squid.sh.j2
        dest: /etc/keepalived/check_and_restart_squid.sh
        owner: root
        group: root
        mode: '0755'
      when: proxy_role == 'access' and enable_keepalived | default(false) and keepalived_vip is defined
      notify: Restart Keepalived

    - name: Deploy Keepalived config (access proxy only)
      ansible.builtin.template:
        src: templates/keepalived.conf.j2
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: '0644'
      when: proxy_role == 'access' and enable_keepalived | default(false) and keepalived_vip is defined
      notify: Restart Keepalived

    - name: Enable IP forwarding for VRRP
      ansible.posix.sysctl:
        name: net.ipv4.ip_nonlocal_bind
        value: '1'
        sysctl_set: true
        state: present
        reload: true
      when: proxy_role == 'access' and enable_keepalived | default(false) and keepalived_vip is defined

    - name: Enable and start Keepalived
      ansible.builtin.systemd:
        name: keepalived
        enabled: true
        state: started
      when: proxy_role == 'access' and enable_keepalived | default(false) and keepalived_vip is defined

    # ===========================================================================
    # Phase: CrowdSec IPS (Intrusion Prevention System)
    # ===========================================================================

    - name: Include CrowdSec role
      ansible.builtin.include_role:
        name: crowdsec
      when: crowdsec_enabled | default(false) | bool
      tags: [crowdsec, security]

  handlers:
    # Примечание: Squid restart выполняется inline в tasks
    # (требуется логика выбора действия на основе изменённых параметров).
    # Handler ниже — для простого reload (passwd, ACL и т.д.)

    - name: Reload Squid
      ansible.builtin.systemd:
        name: squid
        state: reloaded
      tags: always

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Reload sshd
      ansible.builtin.systemd:
        name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
        state: reloaded

    - name: Restart Keepalived
      ansible.builtin.systemd:
        name: keepalived
        state: restarted

    - name: Restart nftables
      ansible.builtin.systemd:
        name: nftables
        state: restarted
