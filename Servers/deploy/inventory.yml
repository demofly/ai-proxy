---
all:
  children:
    access_proxies:
      hosts:
        access01.example.com:
          ansible_host: 203.0.113.1
          keepalived_state: MASTER
          keepalived_priority: 100
        access02.example.com:
          ansible_host: 203.0.113.2
          keepalived_state: BACKUP
          keepalived_priority: 90
      vars:
        proxy_role: access
        squid_port: 443
        enable_auth: true
        enable_logging: true
        enable_caching: true

        # nginx integration - Squid runs behind nginx on localhost
        # Manual override: set behind_nginx=true to force Squid on localhost (for MTProxy integration)
        behind_nginx: true
        squid_local_port: 3128

        # Keepalived настройки
        enable_keepalived: true
        keepalived_vip: 192.168.0.2

        # keepalived_interface: eth0  # Автоопределение через ansible_default_ipv4.interface
        keepalived_vrid: 51
        keepalived_auth_pass: ExAmPlEpAsS2024
    upstreams:
      hosts:
        # NL AMS 1Gbps ExampleVPS
        upstream01.example.com:
          ansible_host: 198.51.100.10
        # PL 1Gbps ExampleVPS
        upstream02.example.com:
          ansible_host: 198.51.100.20

      vars:
        proxy_role: upstream
        squid_port: 80
        enable_auth: false
        enable_logging: false
        enable_caching: false

  vars:
    ansible_user: root
    ansible_python_interpreter: /usr/bin/python3
    
    # Долго думающие и молчащие API нельзя досрочно обрывать
    read_timeout: "30 minutes"

    # =============================================================================
    # CrowdSec IPS (Intrusion Prevention System)
    # =============================================================================

    # Включение/отключение CrowdSec IPS на всех хостах
    # При включении: устанавливается CrowdSec + firewall bouncer (nftables)
    # TI-фиды от сообщества (70k+ серверов) подключаются автоматически через CAPI
    crowdsec_enabled: true

    # Лимиты памяти для CrowdSec компонентов
    crowdsec_memory_mb: 512           # Основной процесс (collections + parsers)
    crowdsec_fw_bouncer_memory_mb: 128  # Firewall bouncer (nftables integration)

    # =============================================================================
    # MTProxy (Telegram Proxy)
    # =============================================================================

    # Включение/отключение MTProxy
    # Архитектура: mtproxy daemon на upstream nodes, nginx stream routing на access nodes
    mtproxy_enabled: true

    # Fake-TLS домен для DPI-маскировки (должен быть внешним популярным доменом)
    # ВАЖНО: НЕ используйте свой домен! Используйте популярный CDN или сервис
    mtproxy_fake_tls_domain: "example.gov.ru"

    # Публичный домен для MTProxy (для маршрутизации в nginx stream SNI)
    # Опционально — используется для маршрутизации трафика на MTProxy backend
    mtproxy_hostname: "tgproxy.example.com"

    # Версия mtg (https://github.com/9seconds/mtg)
    mtproxy_version: "2.1.8"

    # Локальный порт mtg daemon на upstream nodes
    mtproxy_local_port: 2083

    # Секрет для MTProxy (hex, 64 символа)
    # Если пусто — автогенерируется при первом развёртывании
    mtproxy_secret: "aa11bb22cc33dd44ee55ff6600112233096578616d706c652e676f762e7275"

    # Максимум одновременных подключений per IP
    mtproxy_max_connections: 100

    mtproxy_users:
      - name: "Initial deployment"
        telegram: "@none"
        granted: "2026-03-16"
        note: "placeholder record"

    # DNS серверы (upstream unbound → plain DNS к публичным резолверам;
    # access unbound → upstream unbound; Squid → 127.0.0.1 unbound)
    dns_servers:
      - 9.9.9.9
      - 8.8.8.8
      - 1.1.1.1

