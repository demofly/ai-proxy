---
# Порт для локального unbound
dns_resolver_port: 53

# Включение DNSSEC-валидации
dns_resolver_dnssec: true

# Размер кеша (в МБ) — автовычисляется в tasks если не задан
# dns_resolver_cache_mb: 64

# Количество потоков — автовычисляется по CPU если не задан
# dns_resolver_threads: 2

# TTL-лимиты (секунды)
dns_resolver_min_ttl: 300
dns_resolver_max_ttl: 86400
dns_resolver_neg_ttl: 60

# Prefetch популярных записей до истечения TTL
dns_resolver_prefetch: true
